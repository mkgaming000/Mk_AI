name: omniforge_ai
description: OmniForge AI — The Ultimate AI Super App for Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP & Networking
  dio: ^5.4.3
  web_socket_channel: ^2.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2

  # Secure Storage & Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  crypto: ^3.0.3
  pointycastle: ^3.7.3

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Markdown & Code
  flutter_markdown: ^0.7.3
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  code_text_field: ^1.1.0

  # Terminal
  xterm: ^3.6.0

  # File Management
  file_picker: ^8.0.3
  open_filex: ^4.3.4
  archive: ^3.5.0
  path: ^1.9.0

  # Media
  record: ^5.1.0
  just_audio: ^0.9.39
  audioplayers: ^6.0.0
  image_picker: ^1.0.7
  video_player: ^2.8.3

  # PDF
  syncfusion_flutter_pdfviewer: ^25.1.35

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  convert: ^3.1.1
  equatable: ^2.0.5
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.3
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  vibration: ^2.0.0
  image: ^4.1.7
  flutter_image_compress: ^2.2.0
  fuzzy: ^0.5.1

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Slidable
  flutter_slidable: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - assets/models/

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
