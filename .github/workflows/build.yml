name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # Must run BEFORE "Bootstrap Gradle wrapper jar": settings.gradle
      # reads local.properties (for flutter.sdk) as soon as it's evaluated,
      # and `gradle wrapper` triggers that evaluation too. Running this
      # step later caused: "A problem occurred evaluating settings
      # 'android'. > .../android/local.properties (No such file or
      # directory)".
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.buildMode=debug" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      # This repo's gradle-wrapper.jar could not be generated in the
      # environment that produced it (no network access, no local Gradle
      # install available). gradle-wrapper.properties is present and
      # correct, so `gradle wrapper` regenerates the jar here.
      #
      # NOTE: we deliberately do NOT use `apt-get install gradle` — Ubuntu's
      # apt repo ships a very old Gradle (4.4.1) that cannot parse the
      # `plugins {}` block used in settings.gradle (requires Gradle 6.4+),
      # which caused this step to fail with "startup failed: Only Project
      # build scripts can contain plugins {} blocks". Instead we download
      # the exact Gradle version declared in gradle-wrapper.properties
      # directly from the official distribution.
      - name: Bootstrap Gradle wrapper jar
        run: |
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing — regenerating via official Gradle 8.7 distribution"
            curl -sSL -o /tmp/gradle-8.7-bin.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
            unzip -q -d /tmp /tmp/gradle-8.7-bin.zip
            cd android && /tmp/gradle-8.7/bin/gradle wrapper --gradle-version 8.7 --distribution-type all && cd ..
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniforge-ai-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
