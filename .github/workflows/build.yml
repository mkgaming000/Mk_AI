name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # This repo's gradle-wrapper.jar could not be generated in the
      # environment that produced it (no network access, no local Gradle
      # install available). gradle-wrapper.properties is present and
      # correct, so `gradle wrapper` regenerates the jar from the real
      # Gradle distribution here, where network access is available.
      - name: Bootstrap Gradle wrapper jar
        run: |
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing — regenerating via system Gradle"
            sudo apt-get update -qq && sudo apt-get install -y -qq gradle
            cd android && gradle wrapper --gradle-version 8.7 && cd ..
          fi

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.buildMode=debug" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniforge-ai-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
